<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Học Tập Thông Minh - Quiz & Flashcard</title>
    
    <!-- Libraries -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');
        
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow-x: hidden;
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
        }

        /* --- GATEWAY STYLES --- */
        .gateway-container { display: flex; width: 100%; height: 100vh; position: relative; flex-direction: column; }
        @media (min-width: 768px) { .gateway-container { flex-direction: row; } }

        .side { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; cursor: pointer; transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1); color: white; z-index: 1; text-align: center; padding: 20px; position: relative; overflow: hidden; }
        @media (min-width: 768px) { .side:hover { flex: 1.5; filter: brightness(1.1); } }
        .left-side { background: linear-gradient(135deg, #4f46e5 0%, #3730a3 100%); }
        .right-side { background: linear-gradient(135deg, #9333ea 0%, #6b21a8 100%); }

        .side-icon { font-size: 3rem; margin-bottom: 15px; }
        .side h2 { font-size: 1.8rem; font-weight: 800; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 2px; }

        /* --- PAGE CONTENT --- */
        .page-content { position: absolute; top: 0; left: 0; width: 100%; min-height: 100vh; background: #f8fafc; z-index: 10; display: none; flex-direction: column; box-sizing: border-box; }
        .page-content.active { display: block; animation: slideUp 0.4s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .btn-back { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); padding: 10px 20px; background: rgba(15, 23, 42, 0.95); color: white; border-radius: 50px; cursor: pointer; z-index: 1000; font-weight: bold; font-size: 12px; backdrop-filter: blur(8px); box-shadow: 0 10px 30px rgba(0,0,0,0.3); display: flex; align-items: center; gap: 8px; transition: all 0.3s; }

        /* --- UTILS --- */
        textarea.input-ghost { background: transparent; border: 1px solid transparent; resize: none; width: 100%; transition: all 0.2s; overflow: hidden; line-height: 1.6; }
        textarea.input-ghost:focus { background: white; border-color: #e2e8f0; padding: 0.5rem; border-radius: 0.5rem; outline: none; }
        .option-item:hover .delete-option { opacity: 1; }

        /* --- IMAGE STYLES --- */
        .q-image-container { margin: 1rem 0; border-radius: 1rem; overflow: hidden; border: 1px solid #e2e8f0; background: #f1f5f9; width: 100%; display: flex; justify-content: center; position: relative; }
        .q-image { max-height: 400px; width: 100%; object-fit: contain; }

        /* --- FLASHCARD --- */
        .flip-card { perspective: 1000px; height: 300px; width: 100%; max-width: 400px; margin: 0 auto; }
        .flip-card-inner { position: relative; width: 100%; height: 100%; transition: transform 0.4s; transform-style: preserve-3d; cursor: pointer; }
        .flip-card.flipped .flip-card-inner { transform: rotateY(180deg); }
        .flip-card-front, .flip-card-back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; display: flex; align-items: center; justify-content: center; border-radius: 1.5rem; padding: 1.5rem; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        .flip-card-back { transform: rotateY(180deg); }
    </style>
</head>
<body class="bg-slate-50">

    <div class="gateway-container" id="gateway">
        <div class="side left-side" onclick="showPage('quiz-app')">
            <div class="side-icon"><i class="fas fa-tasks"></i></div>
            <h2>QuizFast</h2>
            <p>Ôn tập & Thi thử</p>
            <p>by O.Gia.Huy</p>
        </div>
        <div class="side right-side" onclick="showPage('flashcard-app')">
            <div class="side-icon"><i class="fas fa-clone"></i></div>
            <h2>Flashcard</h2>
            <p>Học từ vựng Pro</p>
            <p>by O.Gia.Huy</p>

        </div>
    </div>

    <button id="backBtn" class="btn-back" style="display: none;" onclick="goHome()">
        <i class="fas fa-home"></i> TRANG CHỦ
    </button>

    <!-- QUIZ APP -->
    <div id="quiz-app" class="page-content">
        <header class="bg-white border-b border-slate-200 sticky top-0 z-50 shadow-sm">
            <div class="max-w-4xl mx-auto px-4 h-14 md:h-16 flex items-center justify-between">
                <div class="flex items-center gap-2 cursor-pointer" onclick="QuizApp.goToInput()">
                    <div class="bg-indigo-600 p-1.5 rounded-lg shadow-md"><i class="fas fa-file-alt text-white text-sm"></i></div>
                    <h1 class="text-lg font-bold bg-clip-text text-transparent bg-gradient-to-r from-indigo-600 to-violet-600">QuizFast</h1>
                </div>
                <div id="quiz-header-actions" class="flex items-center gap-2"></div>
            </div>
        </header>
        <main id="quiz-container" class="max-w-4xl mx-auto px-4 py-6 pb-32"></main>
    </div>

    <!-- FLASHCARD APP -->
    <div id="flashcard-app" class="page-content">
        <div class="max-w-md mx-auto px-5 py-8 pb-32">
            <header class="text-center mb-8">
                <div class="w-14 h-14 bg-gradient-to-br from-purple-600 to-indigo-600 rounded-2xl shadow-lg flex items-center justify-center mx-auto mb-4">
                    <span class="text-white text-2xl font-black">F</span>
                </div>
                <h1 class="text-2xl font-black text-slate-800 tracking-tight">Flashcard Pro</h1>
            </header>
            <div id="fc-game-container" class="hidden">
                <div class="mb-4 flex justify-between items-center text-[10px] font-black uppercase tracking-widest text-slate-400">
                    <span id="fc-card-counter">Thẻ 1 / 1</span>
                    <button onclick="showFCHome()" class="text-indigo-600">DANH SÁCH <i class="fas fa-list ml-1"></i></button>
                </div>
                <div id="fc-flashcard" class="flip-card mb-8" onclick="this.classList.toggle('flipped')">
                    <div class="flip-card-inner">
                        <div class="flip-card-front bg-white border border-slate-100 shadow-xl">
                            <h2 id="fc-display-word" class="text-3xl font-black text-slate-800 break-words px-4">Word</h2>
                        </div>
                        <div class="flip-card-back bg-gradient-to-br from-indigo-600 to-purple-600 text-white shadow-xl text-center flex-col">
                            <p id="fc-display-meaning" class="text-2xl mb-2 font-black px-4">Nghĩa</p>
                            <p id="fc-display-example" class="text-xs italic opacity-80 px-8 font-medium">...</p>
                        </div>
                    </div>
                </div>
                <div class="flex gap-3 justify-center">
                    <button onclick="prevFCCard()" class="flex-1 py-4 rounded-2xl border-2 border-slate-200 bg-white font-black text-slate-400 text-[10px] uppercase">Trước</button>
                    <button onclick="nextFCCard()" class="flex-1 py-4 rounded-2xl bg-indigo-600 text-white shadow-lg font-black text-[10px] uppercase">Tiếp</button>
                </div>
            </div>
            <div id="fc-home-container">
                <div class="flex gap-2 mb-6 bg-slate-200 p-1 rounded-2xl">
                    <button onclick="switchFCTab('single')" id="fc-tab-single" class="flex-1 py-2.5 rounded-xl bg-white shadow-sm font-black text-[10px] uppercase text-indigo-600">Thủ công</button>
                    <button onclick="switchFCTab('bulk')" id="fc-tab-bulk" class="flex-1 py-2.5 rounded-xl text-slate-500 font-black text-[10px] uppercase">Nhập nhanh</button>
                </div>
                <div id="fc-form-single" class="bg-white rounded-3xl p-6 shadow-sm border border-slate-100 mb-8">
                    <div class="space-y-3 mb-4">
                        <input type="text" id="fc-input-word" placeholder="TỪ MỚI" class="w-full px-4 py-3 bg-slate-50 rounded-xl font-bold outline-none text-sm">
                        <input type="text" id="fc-input-meaning" placeholder="NGHĨA" class="w-full px-4 py-3 bg-slate-50 rounded-xl font-bold outline-none text-sm">
                        <textarea id="fc-input-example" placeholder="VÍ DỤ" class="w-full px-4 py-3 bg-slate-50 rounded-xl font-bold outline-none text-sm" rows="2"></textarea>
                    </div>
                    <button onclick="addFCWord()" class="w-full bg-indigo-600 text-white py-4 rounded-xl font-black text-[10px] uppercase tracking-widest shadow-md">Thêm từ mới</button>
                </div>
                <div id="fc-form-bulk" class="hidden bg-white rounded-3xl p-6 shadow-sm border border-slate-100 mb-8">
                    <textarea id="fc-input-bulk" placeholder="Apple - Quả táo&#10;Banana - Quả chuối" class="w-full px-4 py-3 bg-slate-50 rounded-xl mb-3 font-mono text-[10px] font-bold" rows="5"></textarea>
                    <button onclick="addFCBulkWords()" class="w-full bg-indigo-600 text-white py-4 rounded-xl font-black text-[10px] uppercase tracking-widest">Xác nhận</button>
                </div>
                <div class="flex justify-between items-center mb-4 px-2">
                    <h3 class="font-black text-lg text-slate-800">Bộ sưu tập (<span id="fc-total-badge">0</span>)</h3>
                    <div class="flex gap-2">
                        <button onclick="executeClearAllFC()" class="text-[9px] text-red-400 font-black uppercase">Xóa hết</button>
                        <button onclick="startFCLearning()" id="fc-btn-start" class="hidden bg-emerald-500 text-white px-4 py-1.5 rounded-lg font-black text-[9px] uppercase">Học ngay</button>
                    </div>
                </div>
                <div id="fc-word-list" class="space-y-3 max-h-[40vh] overflow-y-auto"></div>
            </div>
        </div>
    </div>

    <script>
        function showPage(pageId) {
            document.getElementById('gateway').style.display = 'none';
            document.querySelectorAll('.page-content').forEach(p => p.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            document.getElementById('backBtn').style.display = 'flex';
        }
        function goHome() {
            document.getElementById('gateway').style.display = 'flex';
            document.querySelectorAll('.page-content').forEach(p => p.classList.remove('active'));
            document.getElementById('backBtn').style.display = 'none';
        }

        /* --- QUIZAPP (BẢN NÂNG CẤP ĐỔI MÀU CARD) --- */
        const QuizApp = (function() {
            let state = {
                view: 'input', questions: [], currentQuizIndex: 0, userAnswers: {}, confirmedAnswers: {},
                score: 0, savedQuizzes: [], currentQuizId: null, examSubmitted: false
            };

            const container = document.getElementById('quiz-container');
            const headerActions = document.getElementById('quiz-header-actions');

            const saveStorage = () => localStorage.setItem('quizfast_data', JSON.stringify(state.savedQuizzes));
            const loadStorage = () => {
                const data = localStorage.getItem('quizfast_data');
                if (data) state.savedQuizzes = JSON.parse(data);
            };

            const autoResize = (el) => {
                if (!el) return;
                el.style.height = 'auto';
                el.style.height = (el.scrollHeight + 4) + 'px';
            };

            const checkCorrect = (q, selected) => {
                const sel = selected || [];
                return q.correctAnswers.length === sel.length && q.correctAnswers.every(l => sel.includes(l));
            };

            const render = () => {
                headerActions.innerHTML = '';
                if (state.view === 'input') renderInput();
                else if (state.view === 'edit') renderEdit();
                else if (state.view === 'practice') renderPractice();
                else if (state.view === 'exam') renderExam();
                else if (state.view === 'result') renderResult();
                else if (state.view === 'export') renderExport();
                
                setTimeout(() => document.querySelectorAll('textarea.input-ghost').forEach(ta => autoResize(ta)), 50);
            };

            const renderInput = () => {
                container.innerHTML = `
                <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                    <div class="lg:col-span-2">
                        <div class="bg-white rounded-3xl shadow-xl border border-slate-200 overflow-hidden">
                            <div class="p-6 border-b border-slate-50 bg-slate-50/50">
                                <h2 class="text-xl font-bold text-slate-800">Dán đề thi</h2>
                                <p class="text-slate-500 text-sm mt-1">Dùng dấu * cho câu đúng. Bảng đáp án hỗ trợ: <b>Câu 1: A.</b></p>
                            </div>
                            <div class="p-6">
                                <textarea id="raw-text-input" placeholder="Câu 1: ...&#10;a. ...&#10;b. ...&#10;&#10;Đáp án:&#10;Câu 1: A." class="w-full h-80 p-5 border border-slate-200 rounded-2xl outline-none font-mono text-sm leading-relaxed"></textarea>
                                <div class="mt-6 flex justify-end">
                                    <button onclick="QuizApp.parseText()" class="bg-indigo-600 text-white px-8 py-4 rounded-2xl font-bold shadow-lg transition-all active:scale-95">Trích xuất <i class="fas fa-magic ml-2"></i></button>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="lg:col-span-1">
                        <div class="bg-white rounded-3xl shadow-lg border border-slate-200 h-full max-h-[600px] flex flex-col">
                            <div class="p-6 border-b border-slate-50 bg-slate-50/50 flex justify-between items-center"><h2 class="text-lg font-bold">Thư viện đề</h2></div>
                            <div id="quiz-list" class="p-4 overflow-y-auto flex-grow space-y-3">
                                ${state.savedQuizzes.length === 0 ? '<p class="text-center text-slate-400 italic py-10">Trống</p>' : 
                                  state.savedQuizzes.map(q => `<div class="flex items-center gap-2"><div onclick="QuizApp.loadQuiz('${q.id}')" class="flex-grow p-4 bg-slate-50 border rounded-xl text-sm font-bold cursor-pointer hover:bg-indigo-50 truncate">${q.title}</div><button onclick="QuizApp.deleteQuiz('${q.id}')" class="text-red-300 hover:text-red-500 p-2"><i class="fas fa-trash"></i></button></div>`).join('')}
                            </div>
                        </div>
                    </div>
                </div>`;
            };

            const renderEdit = () => {
                headerActions.innerHTML = `
                    <button onclick="QuizApp.goExport()" class="bg-slate-100 text-slate-600 border px-3 py-1.5 rounded-xl text-sm font-bold">Văn bản</button>
                    <button onclick="QuizApp.saveCurrent()" class="bg-white text-indigo-600 border border-indigo-200 px-3 py-1.5 rounded-xl text-sm font-bold">Lưu lại</button>
                    <div class="flex gap-1"><button onclick="QuizApp.startPractice()" class="bg-emerald-600 text-white px-4 py-1.5 rounded-l-xl text-sm font-bold">Ôn tập</button><button onclick="QuizApp.startExam()" class="bg-violet-600 text-white px-4 py-1.5 rounded-r-xl text-sm font-bold">Thi thử</button></div>`;
                container.innerHTML = `
                <div class="space-y-6 pb-20">
                    <div class="bg-indigo-50 p-5 rounded-2xl border border-indigo-100 flex justify-between items-center shadow-sm">
                        <div class="flex items-center gap-4"><button onclick="QuizApp.goToInput()" class="w-10 h-10 bg-white rounded-xl flex items-center justify-center text-indigo-600 shadow-sm"><i class="fas fa-arrow-left"></i></button><div><p class="text-indigo-900 font-bold">Sửa đề thi</p><p class="text-xs text-indigo-600/70 italic">Click nhãn A, B... để chọn/bỏ đáp án đúng</p></div></div>
                        <span class="bg-white px-4 py-1 rounded-lg text-indigo-600 font-black">${state.questions.length} CÂU</span>
                    </div>
                    ${state.questions.map((q, idx) => `
                        <div class="bg-white rounded-2xl border border-slate-200 shadow-sm p-6 relative">
                            <div class="flex items-start justify-between gap-4">
                                <div class="flex items-start gap-4 flex-grow">
                                    <span class="flex-shrink-0 w-10 h-10 bg-slate-100 rounded-xl flex items-center justify-center font-bold text-slate-500 mt-1">${idx + 1}</span>
                                    <textarea oninput="QuizApp.updateQText(${q.id}, this.value); QuizApp.autoResize(this)" class="input-ghost text-lg font-bold text-slate-800 leading-snug pt-2" rows="1">${q.question}</textarea>
                                </div>
                                <div class="flex gap-2">
                                    <button onclick="document.getElementById('img-input-${q.id}').click()" class="text-indigo-400 p-2 text-xl"><i class="fas fa-image"></i></button>
                                    <input type="file" id="img-input-${q.id}" class="hidden" accept="image/*" onchange="QuizApp.handleImgUpload(${q.id}, event)">
                                    <button onclick="QuizApp.removeQ(${q.id})" class="text-red-200 hover:text-red-500 p-2"><i class="fas fa-times"></i></button>
                                </div>
                            </div>
                            ${q.image ? `<div class="md:ml-14 q-image-container relative group"><img src="${q.image}" class="q-image" /><button onclick="QuizApp.removeImg(${q.id})" class="absolute top-2 right-2 bg-red-500 text-white w-8 h-8 rounded-full opacity-0 group-hover:opacity-100 transition-all"><i class="fas fa-trash"></i></button></div>` : ''}
                            <div class="md:ml-14 mt-4 flex items-center gap-4 mb-4">
                                <button onclick="QuizApp.toggleMultiType(${q.id})" class="text-[10px] font-black uppercase px-3 py-1.5 rounded-lg border transition-all ${q.isMulti ? 'bg-indigo-600 text-white border-indigo-600 shadow-lg' : 'bg-slate-50 text-slate-400 border-slate-200'}">
                                    ${q.isMulti ? '<i class="fas fa-check-double mr-1"></i> CHẾ ĐỘ CHỌN NHIỀU' : '<i class="fas fa-mouse-pointer mr-1"></i> CHẾ ĐỘ CHỌN 1'}
                                </button>
                                ${q.correctAnswers.length === 0 ? '<span class="text-[10px] font-bold text-orange-500 italic bg-orange-50 px-2 py-1 rounded">⚠️ Câu hỏi không có đáp án đúng (Đúng khi để trống)</span>' : ''}
                            </div>
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 md:ml-14">
                                ${q.options.map(opt => {
                                    const isCorrect = q.correctAnswers.includes(opt.label);
                                    return `<div class="flex items-start gap-2 group option-item">
                                        <div class="flex-grow flex items-start gap-3 p-3 rounded-xl border-2 transition-all ${isCorrect ? 'border-emerald-500 bg-emerald-50' : 'border-slate-50 bg-slate-50/30'}">
                                            <button onclick="QuizApp.toggleCorrect(${q.id}, '${opt.label}')" class="w-8 h-8 ${q.isMulti ? 'rounded-lg' : 'rounded-full'} flex items-center justify-center font-bold flex-shrink-0 mt-0.5 ${isCorrect ? 'bg-emerald-500 text-white border-transparent' : 'bg-white border border-slate-200'}">${opt.label}</button>
                                            <textarea oninput="QuizApp.updateOptText(${q.id}, '${opt.label}', this.value); QuizApp.autoResize(this)" class="input-ghost font-medium text-sm pt-1.5" rows="1">${opt.text}</textarea>
                                        </div>
                                        <button onclick="QuizApp.removeOpt(${q.id}, '${opt.label}')" class="delete-option opacity-0 text-slate-300 hover:text-red-500 p-1 mt-2"><i class="fas fa-minus-circle"></i></button>
                                    </div>`;
                                }).join('')}
                                <button onclick="QuizApp.addOpt(${q.id})" class="flex items-center justify-center gap-2 p-3 rounded-xl border-2 border-dashed border-slate-200 text-slate-400 hover:border-indigo-300 transition-all text-sm font-bold">+ Thêm đáp án</button>
                            </div>
                        </div>`).join('')}
                    <div class="flex justify-center mt-10"><button onclick="QuizApp.addQ()" class="bg-indigo-50 text-indigo-600 border-2 border-dashed border-indigo-200 px-10 py-5 rounded-3xl font-bold hover:bg-indigo-100 active:scale-95 shadow-sm"><i class="fas fa-plus-circle mr-2"></i> Thêm câu mới</button></div>
                </div>`;
            };

            const renderPractice = () => {
                const q = state.questions[state.currentQuizIndex];
                const hasConfirmed = !!state.confirmedAnswers[q.id];
                const selected = state.userAnswers[q.id] || [];
                const progress = ((state.currentQuizIndex + 1) / state.questions.length) * 100;
                
                // Logic đổi màu CARD
                let cardClass = "bg-white border-slate-100";
                if (hasConfirmed) {
                    const isRight = checkCorrect(q, selected);
                    cardClass = isRight ? "bg-emerald-50 border-emerald-500 ring-2 ring-emerald-500/10" : "bg-red-50 border-red-500 ring-2 ring-red-500/10";
                }

                container.innerHTML = `
                <div class="max-w-2xl mx-auto">
                    <div class="mb-8 px-2"><div class="flex justify-between text-xs font-black text-indigo-500 uppercase mb-2"><span>Câu ${state.currentQuizIndex+1}/${state.questions.length} ${q.isMulti ? '[Chọn nhiều]' : ''}</span><span class="text-emerald-500">Đúng: ${state.score}</span></div><div class="w-full bg-slate-200 h-3 rounded-full overflow-hidden shadow-inner"><div class="bg-indigo-600 h-full transition-all duration-500" style="width: ${progress}%"></div></div></div>
                    <div class="rounded-[2.5rem] shadow-2xl border p-8 sm:p-12 transition-all duration-500 ${cardClass}">
                        <h2 class="text-xl sm:text-2xl font-bold text-slate-800 mb-6 leading-tight whitespace-pre-line">${q.question}</h2>
                        ${q.image ? `<div class="q-image-container mb-8"><img src="${q.image}" class="q-image" /></div>` : ''}
                        <div class="space-y-4">
                            ${q.options.map(opt => {
                                const isSelected = selected.includes(opt.label);
                                const isCorrect = q.correctAnswers.includes(opt.label);
                                
                                let style = "border-slate-100 bg-white hover:border-indigo-200";
                                let btnClass = isSelected ? "bg-indigo-600 text-white border-transparent" : "bg-white text-slate-400 border border-slate-200";
                                let icon = "";

                                if (hasConfirmed) {
                                    if (isCorrect) { 
                                        style = "border-emerald-500 border-[3px] bg-white text-emerald-700"; 
                                        btnClass = "bg-emerald-500 text-white border-transparent"; 
                                        icon = '<i class="fas fa-check-circle text-emerald-500 ml-auto"></i>'; 
                                    } else if (isSelected) { 
                                        style = "border-red-500 border-[3px] bg-white text-red-700"; 
                                        btnClass = "bg-red-500 text-white border-transparent"; 
                                        icon = '<i class="fas fa-times-circle text-red-500 ml-auto"></i>'; 
                                    } else { style = "opacity-40 grayscale-[0.5] border-transparent bg-transparent"; }
                                } else if (isSelected) { 
                                    style = "border-indigo-500 border-[3px] bg-indigo-50/50"; 
                                }
                                
                                return `<button ${hasConfirmed ? 'disabled' : ''} onclick="QuizApp.handleAns('${opt.label}', ${q.isMulti})" class="w-full flex items-start gap-4 p-5 rounded-2xl border-2 font-bold transition-all text-left ${style}">
                                    <span class="w-10 h-10 ${q.isMulti ? 'rounded-lg' : 'rounded-full'} flex items-center justify-center flex-shrink-0 font-bold mt-0.5 shadow-sm ${btnClass}">${opt.label}</span>
                                    <span class="text-sm sm:text-base pt-1 flex-grow">${opt.text}</span>${icon}
                                </button>`;
                            }).join('')}
                        </div>
                        <div class="mt-12 flex justify-between items-center">
                            <button onclick="QuizApp.prev()" class="flex items-center gap-2 px-6 py-3 rounded-xl font-bold text-slate-400 hover:text-indigo-600 transition-all ${state.currentQuizIndex === 0 ? 'invisible' : ''}"><i class="fas fa-arrow-left"></i></button>
                            <div class="flex gap-2">
                                ${!hasConfirmed ? `<button onclick="QuizApp.confirmAns()" class="bg-indigo-600 text-white px-10 py-4 rounded-2xl font-bold shadow-xl active:scale-95 transition-all">Xác nhận</button>` : ''}
                                <button onclick="QuizApp.next()" class="bg-slate-900 text-white px-8 py-4 rounded-2xl font-bold shadow-xl active:scale-95">${state.currentQuizIndex === state.questions.length - 1 ? 'Kết quả' : 'Tiếp tục'} <i class="fas fa-chevron-right ml-2"></i></button>
                            </div>
                        </div>
                    </div>
                </div>`;
            };

            const renderExam = () => {
                container.innerHTML = `
                <div class="space-y-8 pb-20">
                    <div class="bg-white p-6 rounded-3xl shadow-lg border sticky top-14 z-40 flex justify-between items-center"><div><h2 class="text-xl font-bold">Ôn thi tổng hợp</h2><p class="text-sm text-slate-400">Hoàn thành để nộp bài</p></div>
                        ${!state.examSubmitted ? `<button onclick="QuizApp.submitExam()" class="bg-indigo-600 text-white px-10 py-4 rounded-2xl font-bold shadow-xl">Nộp bài <i class="fas fa-paper-plane ml-2"></i></button>` : 
                        `<div class="flex items-center gap-6 text-right"><div><p class="text-xs font-bold text-slate-400">KẾT QUẢ</p><p class="text-2xl font-black text-indigo-600">${state.score}/${state.questions.length}</p></div><button onclick="QuizApp.goEdit()" class="bg-slate-900 text-white px-6 py-3 rounded-xl font-bold">Thoát</button></div>`}
                    </div>
                    <div class="space-y-6">${state.questions.map((q, idx) => {
                        const selected = state.userAnswers[q.id] || [];
                        let cardClass = "bg-white border-slate-100";
                        if (state.examSubmitted) {
                            cardClass = checkCorrect(q, selected) ? "bg-emerald-50 border-emerald-500" : "bg-red-50 border-red-500";
                        }
                        return `<div class="rounded-2xl border p-6 shadow-sm transition-colors duration-500 ${cardClass}"><div class="flex items-start gap-4 mb-4"><span class="w-10 h-10 bg-slate-100 rounded-xl flex items-center justify-center font-bold text-slate-500 mt-1">${idx+1}</span><h3 class="text-lg font-bold text-slate-800 pt-1">${q.question}</h3></div>
                            ${q.image ? `<div class="q-image-container md:ml-14 mb-6"><img src="${q.image}" class="q-image" /></div>` : ''}
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-3 md:ml-14">
                                ${q.options.map(opt => {
                                    const isSel = selected.includes(opt.label);
                                    const isCor = q.correctAnswers.includes(opt.label);
                                    let style = "border-slate-50 bg-white/50 hover:border-indigo-100";
                                    let btnClass = isSel ? "bg-indigo-600 text-white border-transparent" : "bg-white text-slate-400 border border-slate-200";
                                    if (state.examSubmitted) {
                                        if (isCor) { style = "border-emerald-500 border-[3px] bg-white text-emerald-900"; btnClass = "bg-emerald-500 text-white border-transparent"; }
                                        else if (isSel) { style = "border-red-500 border-[3px] bg-white text-red-900"; btnClass = "bg-red-500 text-white border-transparent"; }
                                        else style = "opacity-50 grayscale-[0.5] border-transparent bg-transparent";
                                    } else if (isSel) { style = "border-indigo-500 border-[3px] bg-indigo-50/50"; }
                                    return `<button ${state.examSubmitted ? 'disabled' : ''} onclick="QuizApp.handleExamSelect(${q.id}, '${opt.label}', ${q.isMulti})" class="flex items-start gap-4 p-4 rounded-xl border-2 font-semibold transition-all text-left ${style}">
                                        <span class="w-8 h-8 ${q.isMulti ? 'rounded-lg' : 'rounded-full'} flex items-center justify-center font-bold mt-0.5 shadow-sm ${btnClass}">${opt.label}</span><span class="text-sm pt-0.5">${opt.text}</span></button>`;
                                }).join('')}
                            </div></div>`;
                    }).join('')}</div></div>`;
            };

            const renderResult = () => {
                const pc = Math.round((state.score/state.questions.length)*100);
                container.innerHTML = `<div class="max-w-md mx-auto text-center pt-10"><div class="bg-white rounded-[3rem] shadow-2xl p-12 border">
                    <div class="text-5xl text-indigo-600 mb-6"><i class="fas fa-award"></i></div><h2 class="text-3xl font-black text-slate-800">Hoàn thành!</h2>
                    <div class="text-7xl font-black text-indigo-600 my-8">${state.score}<span class="text-2xl text-slate-300">/${state.questions.length}</span></div><p class="text-sm font-bold text-slate-400 uppercase tracking-widest mb-10">${pc}% CHÍNH XÁC</p>
                    <div class="space-y-4"><button onclick="QuizApp.startPractice()" class="w-full bg-indigo-600 text-white py-5 rounded-2xl font-bold shadow-xl">Làm lại <i class="fas fa-redo ml-2"></i></button><button onclick="QuizApp.goEdit()" class="w-full py-5 text-slate-400 font-bold">Về Chỉnh sửa</button></div></div></div>`;
            };

            const renderExport = () => {
                let text = ""; state.questions.forEach((q, idx) => {
                    text += `Câu ${idx + 1}: ${q.question}\n`; q.options.forEach(o => text += `${q.correctAnswers.includes(o.label) ? '*' : ''}${o.label}. ${o.text}\n`);
                    text += `\n---------------------------\n\n`;
                });
                container.innerHTML = `<div class="max-w-2xl mx-auto"><div class="bg-white rounded-3xl shadow-xl border overflow-hidden"><div class="p-6 border-b bg-indigo-600 text-white flex justify-between items-center"><h2 class="font-bold"><i class="fas fa-copy"></i> Dạng văn bản</h2><button onclick="QuizApp.goEdit()"><i class="fas fa-times text-xl"></i></button></div>
                    <div class="p-6"><textarea id="exp-area" readonly class="w-full h-[500px] p-5 border bg-slate-50 rounded-2xl outline-none font-mono text-sm leading-relaxed">${text}</textarea><div class="mt-6 flex gap-3"><button onclick="QuizApp.copyExport()" class="flex-grow bg-indigo-600 text-white py-4 rounded-2xl font-bold shadow-lg">Sao chép</button><button onclick="QuizApp.goEdit()" class="px-8 bg-slate-100 rounded-2xl font-bold">Đóng</button></div></div></div></div>`;
            };

            return {
                init: () => { loadStorage(); render(); },
                autoResize,
                handleImgUpload: (qId, event) => {
                    const file = event.target.files[0]; if (!file) return;
                    const reader = new FileReader(); reader.onload = (e) => {
                        state.questions = state.questions.map(q => q.id === qId ? {...q, image: e.target.result} : q); render();
                    }; reader.readAsDataURL(file);
                },
                removeImg: (qId) => { state.questions = state.questions.map(q => q.id === qId ? {...q, image: null} : q); render(); },
                toggleMultiType: (qId) => { state.questions = state.questions.map(q => q.id === qId ? {...q, isMulti: !q.isMulti} : q); render(); },
                parseText: () => {
                    const text = document.getElementById('raw-text-input').value.trim(); if (!text) return;
                    state.rawText = text;
                    const answerSectionIdx = text.search(/(?:đáp án|dap an|key):/gi);
                    let mainText = text; let ansKey = "";
                    if (answerSectionIdx !== -1) { mainText = text.substring(0, answerSectionIdx); ansKey = text.substring(answerSectionIdx); }
                    
                    const autoAns = {};
                    const pairs = ansKey.match(/(?:câu|cau|caau)?\s*(\d+)\s*[:.]?\s*([A-D,\s\.]+)/gi);
                    if (pairs) pairs.forEach(p => { 
                        const m = p.match(/(\d+)\s*[:.]?\s*([A-D,\s\.]+)/i); 
                        if (m) { 
                            const labs = m[2].toUpperCase().match(/[A-D]/g); 
                            if(labs) autoAns[parseInt(m[1])] = labs; 
                        }
                    });

                    const blocks = ("\n" + mainText).split(/\n\s*(?=(?:câu|cau|caau)\s*\d+|^\d+[.:)\-\s]+)/gi).filter(b => b.trim().length > 5);
                    state.questions = blocks.map((block, index) => {
                        const lines = block.split('\n').filter(l => l.trim() !== '');
                        const optRegex = /^\s*(\*?)([A-D])[\.\s:)\-]\s*(.*)$/i;
                        
                        let firstOptIdx = lines.findIndex(line => {
                            const match = line.trim().match(optRegex);
                            const isStartingWithCau = line.trim().toLowerCase().startsWith('câu');
                            return match && !isStartingWithCau;
                        });
                        
                        if (firstOptIdx === -1) firstOptIdx = 1;
                        let rawQ = lines.slice(0, firstOptIdx).join('\n');
                        const qNumM = rawQ.match(/^(?:câu|cau|caau)\s*(\d+)|^\s*(\d+)/i);
                        const qNum = qNumM ? parseInt(qNumM[1] || qNumM[2]) : (index + 1);
                        const qText = rawQ.replace(/^(?:câu|cau|caau)\s*\d+[.:)\-\s]*|^\d+[.:)\-\s]+/i, '').trim();
                        
                        const opts = []; const foundCor = [];
                        lines.slice(firstOptIdx).forEach(l => {
                            const trimL = l.trim();
                            if(trimL.toLowerCase().startsWith('câu')) return;
                            
                            const m = trimL.match(optRegex);
                            if (m) { 
                                const lab = m[2].toUpperCase(); 
                                opts.push({ label: lab, text: m[3].trim() }); 
                                if (m[1] === '*') foundCor.push(lab); 
                            }
                        });
                        
                        let finalCor = foundCor.length > 0 ? foundCor : (autoAns[qNum] || []);
                        if (opts.length === 0) {
                            lines.slice(1).forEach((line, i) => {
                                if(!line.trim().toLowerCase().startsWith('câu')) {
                                    opts.push({ label: String.fromCharCode(65 + i), text: line.trim() });
                                }
                            });
                        }
                        
                        return { id: Date.now() + index, question: qText || "...", options: opts, correctAnswers: finalCor, isMulti: finalCor.length > 1, image: null };
                    });
                    state.view = 'edit'; render();
                },
                saveCurrent: () => {
                    if (!state.questions.length) return;
                    const id = state.currentQuizId || Date.now().toString();
                    const data = { id, title: state.questions[0].question.substring(0, 50) + "...", questions: state.questions };
                    const idx = state.savedQuizzes.findIndex(q => q.id === id);
                    if (idx > -1) state.savedQuizzes[idx] = data; else state.savedQuizzes.unshift(data);
                    state.currentQuizId = id; saveStorage(); alert("Đã lưu!"); render();
                },
                loadQuiz: (id) => { const q = state.savedQuizzes.find(x => x.id === id); if(q) { Object.assign(state, {currentQuizId: q.id, questions: q.questions, view: 'edit'}); render(); } },
                deleteQuiz: (id) => { if(confirm("Xóa?")) { state.savedQuizzes = state.savedQuizzes.filter(q => q.id !== id); saveStorage(); render(); } },
                goToInput: () => { Object.assign(state, {view: 'input', currentQuizId: null, questions: []}); render(); },
                goEdit: () => { state.view = 'edit'; render(); },
                goExport: () => { state.view = 'export'; render(); },
                copyExport: () => { document.getElementById('exp-area').select(); document.execCommand('copy'); alert("Đã copy!"); },
                startPractice: () => { 
                    Object.assign(state, {view: 'practice', currentQuizIndex: 0, userAnswers: {}, confirmedAnswers: {}, score: 0}); render(); 
                },
                startExam: () => { 
                    Object.assign(state, {view: 'exam', userAnswers: {}, examSubmitted: false, score: 0}); render(); 
                },
                handleAns: (lab, isMulti) => {
                    const qId = state.questions[state.currentQuizIndex].id; if(state.confirmedAnswers[qId]) return;
                    let sel = state.userAnswers[qId] || [];
                    if (isMulti) {
                        if (sel.includes(lab)) sel = sel.filter(l => l !== lab);
                        else sel.push(lab);
                    } else {
                        if (sel.includes(lab)) sel = [];
                        else sel = [lab];
                    }
                    state.userAnswers[qId] = sel; render();
                },
                confirmAns: () => {
                    const q = state.questions[state.currentQuizIndex]; 
                    const sel = state.userAnswers[q.id] || [];
                    state.confirmedAnswers[q.id] = true;
                    if(checkCorrect(q, sel)) state.score++; render();
                },
                handleExamSelect: (qId, lab, isMulti) => { if(state.examSubmitted) return; let sel = state.userAnswers[qId] || [];
                    if (isMulti) {
                        if (sel.includes(lab)) sel = sel.filter(l => l !== lab);
                        else sel.push(lab);
                    } else {
                        if (sel.includes(lab)) sel = [];
                        else sel = [lab];
                    }
                    state.userAnswers[qId] = sel; render();
                },
                submitExam: () => { if(Object.keys(state.userAnswers).length < state.questions.length && !confirm("Nộp luôn?")) return;
                    let s = 0; state.questions.forEach(q => { const sel = state.userAnswers[q.id] || [];
                        if(checkCorrect(q, sel)) s++;
                    }); state.score = s; state.examSubmitted = true; render(); window.scrollTo(0,0);
                },
                next: () => { if(state.currentQuizIndex < state.questions.length - 1) { state.currentQuizIndex++; render(); } else { state.view = 'result'; render(); } },
                prev: () => { if(state.currentQuizIndex > 0) { state.currentQuizIndex--; render(); } },
                toggleCorrect: (qId, lab) => { state.questions = state.questions.map(q => {
                        if (q.id === qId) { let cors = q.correctAnswers || []; if (cors.includes(lab)) cors = cors.filter(l => l !== lab); else cors.push(lab); return {...q, correctAnswers: cors}; } return q;
                    }); render(); },
                updateQText: (id, txt) => { state.questions = state.questions.map(q => q.id === id ? {...q, question: txt} : q); },
                updateOptText: (qId, lab, txt) => { state.questions = state.questions.map(q => q.id === qId ? {...q, options: q.options.map(o => o.label === lab ? {...o, text: txt} : o)} : q); },
                addQ: () => { state.questions.push({ id: Date.now(), question: 'Câu mới...', options: [{label:'A', text:'Mới A'}, {label:'B', text:'Mới B'}], correctAnswers: [], isMulti: false, image: null }); render(); },
                removeQ: (id) => { if(confirm("Xóa?")) { state.questions = state.questions.filter(q => q.id !== id); render(); } },
                addOpt: (qId) => { state.questions = state.questions.map(q => q.id === qId ? {...q, options: [...q.options, {label: String.fromCharCode(65+q.options.length), text: 'Mới'}]} : q); render(); },
                removeOpt: (qId, lab) => { state.questions = state.questions.map(q => q.id === qId ? {...q, options: q.options.filter(o => o.label !== lab).map((o, i) => ({...o, label: String.fromCharCode(65+i)})), correctAnswers: q.correctAnswers.filter(l => l !== lab)} : q); render(); }
            };
        })();

        /* --- FLASHCARD --- */
        const FlashcardApp = (function() {
            let cards = JSON.parse(localStorage.getItem('my_flashcards_pro')) || [];
            let currentIndex = 0;
            const updateUI = () => {
                const listEl = document.getElementById('fc-word-list'); const btnStart = document.getElementById('fc-btn-start');
                document.getElementById('fc-total-badge').innerText = cards.length; localStorage.setItem('my_flashcards_pro', JSON.stringify(cards));
                if (cards.length === 0) { listEl.innerHTML = '<p class="text-center py-6 opacity-20 text-[10px] font-black uppercase">Trống</p>'; btnStart.classList.add('hidden'); } 
                else { btnStart.classList.remove('hidden'); listEl.innerHTML = [...cards].reverse().map((card, i) => `<div class="bg-white p-4 rounded-2xl border flex justify-between items-center shadow-sm"><div class="truncate pr-4"><p class="font-black text-indigo-600 text-sm">${card.word}</p><p class="text-[9px] text-slate-400 font-bold uppercase truncate">${card.meaning}</p></div><button onclick="FlashcardApp.deleteCard(${cards.length - 1 - i})" class="text-red-200 hover:text-red-500 p-2"><i class="fas fa-trash"></i></button></div>`).join(''); }
            };
            return {
                init: () => updateUI(),
                switchTab: (type) => {
                    const ts = document.getElementById('fc-tab-single'), tb = document.getElementById('fc-tab-bulk');
                    const fs = document.getElementById('fc-form-single'), fb = document.getElementById('fc-form-bulk');
                    if (type === 'single') { ts.className = 'flex-1 py-2.5 rounded-xl bg-white shadow-sm font-black text-[10px] uppercase text-indigo-600'; tb.className = 'flex-1 py-2.5 rounded-xl text-slate-500 font-black text-[10px] uppercase'; fs.classList.remove('hidden'); fb.classList.add('hidden'); } 
                    else { tb.className = 'flex-1 py-2.5 rounded-xl bg-white shadow-sm font-black text-[10px] uppercase text-indigo-600'; ts.className = 'flex-1 py-2.5 rounded-xl text-slate-500 font-black text-[10px] uppercase'; fb.classList.remove('hidden'); fs.classList.add('hidden'); }
                },
                addWord: () => {
                    const w = document.getElementById('fc-input-word'), m = document.getElementById('fc-input-meaning'), e = document.getElementById('fc-input-example');
                    if (!w.value.trim() || !m.value.trim()) return; cards.push({ word: w.value.trim(), meaning: m.value.trim(), example: e.value.trim() });
                    w.value = ''; m.value = ''; e.value = ''; updateUI();
                },
                addBulk: () => {
                    const input = document.getElementById('fc-input-bulk'); input.value.split('\n').forEach(line => {
                        const parts = line.split(/[-:—\t]/); if (parts.length >= 2) cards.push({ word: parts[0].trim(), meaning: parts.slice(1).join('-').trim(), example: '' });
                    }); input.value = ''; updateUI();
                },
                deleteCard: (idx) => { cards.splice(idx, 1); updateUI(); },
                start: () => { if(cards.length === 0) return; currentIndex = 0; document.getElementById('fc-home-container').classList.add('hidden'); document.getElementById('fc-game-container').classList.remove('hidden'); FlashcardApp.showCard(); },
                showHome: () => { document.getElementById('fc-home-container').classList.remove('hidden'); document.getElementById('fc-game-container').classList.add('hidden'); },
                showCard: () => {
                    const card = cards[currentIndex]; document.getElementById('fc-flashcard').classList.remove('flipped');
                    setTimeout(() => { document.getElementById('fc-display-word').innerText = card.word; document.getElementById('fc-display-meaning').innerText = card.meaning; document.getElementById('fc-display-example').innerText = card.example || '...'; document.getElementById('fc-card-counter').innerText = `Thẻ ${currentIndex + 1} / ${cards.length}`; }, 150);
                },
                next: () => { currentIndex = (currentIndex + 1) % cards.length; FlashcardApp.showCard(); },
                prev: () => { currentIndex = (currentIndex - 1 + cards.length) % cards.length; FlashcardApp.showCard(); },
                executeClearAllFC: () => { if(confirm("Xóa hết?")) { cards = []; updateUI(); } }
            };
        })();

        window.switchFCTab = FlashcardApp.switchTab;
        window.addFCWord = FlashcardApp.addWord;
        window.addFCBulkWords = FlashcardApp.addBulk;
        window.executeClearAllFC = FlashcardApp.executeClearAllFC;
        window.startFCLearning = FlashcardApp.start;
        window.showFCHome = FlashcardApp.showHome;
        window.nextFCCard = FlashcardApp.next;
        window.prevFCCard = FlashcardApp.prev;

        QuizApp.init(); FlashcardApp.init();
    </script>
</body>
</html>
