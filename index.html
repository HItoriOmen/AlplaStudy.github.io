<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Flashcard Học Từ Vựng Pro</title>
    
    <!-- Apple Touch Icon (Làm cho icon iPhone đẹp hơn) -->
    <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0%25' y1='0%25' x2='100%25' y2='100%25'%3E%3Cstop offset='0%25' style='stop-color:%234f46e5'/%3E%3Cstop offset='100%25' style='stop-color:%239333ea'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='180' height='180' rx='40' fill='url(%23g)'/%3E%3Ctext x='50%25' y='55%25' font-family='sans-serif' font-weight='bold' font-size='100' fill='white' text-anchor='middle' dominant-baseline='middle'%3EF%3C/text%3E%3C/svg%3E">
    
    <!-- Meta cho Web App Mode -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Flashcard">

    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }
        .flip-card {
            perspective: 1000px;
            height: 320px;
        }
        .flip-card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            text-align: center;
            transition: transform 0.4s;
            transform-style: preserve-3d;
            cursor: pointer;
        }
        .flip-card.flipped .flip-card-inner {
            transform: rotateY(180deg);
        }
        .flip-card-front, .flip-card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 1.5rem;
            padding: 1.5rem;
            box-shadow: 0 10px 25px -5px rgba(79, 70, 229, 0.2);
        }
        .flip-card-back {
            transform: rotateY(180deg);
        }
        .fade-in {
            animation: fadeIn 0.3s ease-in;
        }
        @keyframes fadeIn {
            from { opacity: 0.5; }
            to { opacity: 1; }
        }
        #confirm-modal {
            background: rgba(0, 0, 0, 0.7);
            display: none;
            align-items: center;
            justify-content: center;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 100;
            backdrop-filter: blur(4px);
        }
        #word-list { -webkit-overflow-scrolling: touch; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen font-sans text-slate-900 select-none pb-10">
    <!-- Custom Confirm Modal -->
    <div id="confirm-modal">
        <div class="bg-white p-6 rounded-3xl shadow-2xl max-w-sm w-full mx-6 transform transition-all scale-100">
            <div class="w-12 h-12 bg-red-100 rounded-full flex items-center justify-center mb-4 mx-auto">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-red-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                </svg>
            </div>
            <h3 class="text-xl font-bold mb-2 text-center">Xóa hết từ vựng?</h3>
            <p class="text-slate-500 mb-6 text-sm text-center">Dữ liệu đã xóa sẽ không thể khôi phục lại được.</p>
            <div class="flex gap-3">
                <button onclick="closeModal()" class="flex-1 px-4 py-3 bg-slate-100 active:bg-slate-200 rounded-2xl font-bold transition">Hủy</button>
                <button onclick="executeClearAll()" class="flex-1 px-4 py-3 bg-red-500 active:bg-red-600 text-white rounded-2xl font-bold transition">Xác nhận</button>
            </div>
        </div>
    </div>

    <div class="max-w-md mx-auto px-5 py-8">
        <header class="text-center mb-10">
            <div class="w-16 h-16 bg-gradient-to-br from-indigo-600 to-purple-600 rounded-2xl shadow-lg flex items-center justify-center mx-auto mb-4">
                <span class="text-white text-3xl font-black">F</span>
            </div>
            <h1 class="text-3xl font-black text-slate-800 tracking-tight">Flashcard Pro</h1>
            <p class="text-slate-400 text-sm font-bold uppercase tracking-widest mt-1">Smart Learning</p>
        </header>

        <!-- Flashcard Display -->
        <div id="game-container" class="hidden">
            <div class="mb-6 flex justify-between items-center text-[10px] font-black uppercase tracking-[0.2em] text-slate-400">
                <span id="card-counter" class="bg-white px-3 py-1 rounded-full border border-slate-100 shadow-sm">Thẻ 1 / 1</span>
                <button onclick="showHome()" class="text-indigo-600 flex items-center gap-1.5 hover:opacity-70 transition">
                    TRANG CHỦ
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" />
                    </svg>
                </button>
            </div>

            <div id="flashcard" class="flip-card mb-10" onclick="this.classList.toggle('flipped')">
                <div class="flip-card-inner" id="card-inner">
                    <div class="flip-card-front bg-white border border-slate-100 shadow-xl">
                        <h2 id="display-word" class="text-4xl font-black text-slate-800 break-words px-4">Word</h2>
                    </div>
                    <div class="flip-card-back bg-gradient-to-br from-indigo-600 to-purple-600 text-white shadow-xl">
                        <div class="text-center w-full">
                            <p id="display-meaning" class="text-3xl mb-4 font-black px-4">Nghĩa</p>
                            <p id="display-example" class="text-sm italic opacity-70 px-8 font-medium">...</p>
                        </div>
                    </div>
                </div>
            </div>

            <div class="flex gap-4 justify-center">
                <button onclick="prevCard()" class="flex-1 py-5 rounded-[2rem] border-2 border-slate-200 bg-white active:bg-slate-100 transition-all font-black text-slate-400 text-sm tracking-widest uppercase">Trước</button>
                <button onclick="nextCard()" class="flex-1 py-5 rounded-[2rem] bg-indigo-600 text-white active:bg-indigo-700 shadow-xl shadow-indigo-100 transition-all font-black text-sm tracking-widest uppercase">Tiếp</button>
            </div>
            <p class="text-center mt-10 text-slate-300 text-[10px] font-black uppercase tracking-[0.25em]">Chạm để lật thẻ</p>
        </div>

        <!-- Dashboard / List -->
        <div id="home-container">
            <div class="flex gap-2 mb-6 bg-slate-200 p-1 rounded-2xl">
                <button onclick="switchTab('single')" id="tab-single" class="flex-1 py-3 rounded-xl bg-white shadow-sm font-black text-xs uppercase tracking-widest text-indigo-600 transition-all">Thủ công</button>
                <button onclick="switchTab('bulk')" id="tab-bulk" class="flex-1 py-3 rounded-xl text-slate-500 font-black text-xs uppercase tracking-widest transition-all">Nhập nhanh</button>
            </div>

            <div id="form-single" class="bg-white rounded-3xl p-6 shadow-sm border border-slate-100 mb-10">
                <div class="space-y-4 mb-5">
                    <input type="text" id="input-word" placeholder="TỪ MỚI" class="w-full px-5 py-4 bg-slate-50 border-none rounded-2xl focus:ring-2 focus:ring-indigo-500 outline-none font-bold text-slate-700">
                    <input type="text" id="input-meaning" placeholder="NGHĨA CỦA TỪ" class="w-full px-5 py-4 bg-slate-50 border-none rounded-2xl focus:ring-2 focus:ring-indigo-500 outline-none font-bold text-slate-700">
                    <textarea id="input-example" placeholder="VÍ DỤ (TÙY CHỌN)" class="w-full px-5 py-4 bg-slate-50 border-none rounded-2xl focus:ring-2 focus:ring-indigo-500 outline-none font-bold text-slate-700" rows="2"></textarea>
                </div>
                <button onclick="addWord()" class="w-full bg-indigo-600 text-white py-5 rounded-2xl font-black text-xs uppercase tracking-[0.2em] active:scale-[0.98] transition-all shadow-lg shadow-indigo-100">Thêm từ mới</button>
            </div>

            <div id="form-bulk" class="hidden bg-white rounded-3xl p-6 shadow-sm border border-slate-100 mb-10">
                <p class="text-[10px] text-slate-400 font-black uppercase mb-4 tracking-widest text-center">Định dạng: Từ - Nghĩa</p>
                <textarea id="input-bulk" placeholder="Apple - Quả táo&#10;Banana - Quả chuối" class="w-full px-5 py-4 bg-slate-50 border-none rounded-2xl focus:ring-2 focus:ring-indigo-500 outline-none mb-4 font-mono text-xs font-bold leading-relaxed" rows="5"></textarea>
                <button onclick="addBulkWords()" class="w-full bg-indigo-600 text-white py-5 rounded-2xl font-black text-xs uppercase tracking-[0.2em] active:scale-[0.98] transition-all shadow-lg shadow-indigo-100">Xác nhận nhập</button>
            </div>

            <div class="flex justify-between items-center mb-6 px-2">
                <div>
                    <h3 class="font-black text-2xl text-slate-800 tracking-tight">Bộ sưu tập</h3>
                    <p class="text-[10px] text-slate-400 font-black uppercase tracking-widest mt-0.5"><span id="total-badge" class="text-indigo-500">0</span> từ đã học</p>
                </div>
                <div class="flex gap-4">
                    <button onclick="openClearModal()" class="text-[10px] text-red-400 font-black uppercase tracking-[0.15em] hover:text-red-600 transition">Xóa sạch</button>
                    <button onclick="startLearning()" id="btn-start" class="hidden bg-emerald-500 text-white px-8 py-3 rounded-2xl font-black text-xs uppercase tracking-[0.2em] shadow-lg shadow-emerald-50 shadow-emerald-100 active:scale-95 transition-all">HỌC</button>
                </div>
            </div>
            
            <div id="word-list" class="space-y-4 max-h-[45vh] overflow-y-auto pb-20">
                <!-- List items -->
            </div>
        </div>
    </div>

    <script>
        let cards = JSON.parse(localStorage.getItem('my_flashcards_pro')) || [];
        let currentIndex = 0;

        function switchTab(type) {
            const ts = document.getElementById('tab-single');
            const tb = document.getElementById('tab-bulk');
            const fs = document.getElementById('form-single');
            const fb = document.getElementById('form-bulk');
            if (type === 'single') {
                ts.className = 'flex-1 py-3 rounded-xl bg-white shadow-sm font-black text-xs uppercase tracking-widest text-indigo-600 transition-all';
                tb.className = 'flex-1 py-3 rounded-xl text-slate-500 font-black text-xs uppercase tracking-widest transition-all';
                fs.classList.remove('hidden'); fb.classList.add('hidden');
            } else {
                tb.className = 'flex-1 py-3 rounded-xl bg-white shadow-sm font-black text-xs uppercase tracking-widest text-indigo-600 transition-all';
                ts.className = 'flex-1 py-3 rounded-xl text-slate-500 font-black text-xs uppercase tracking-widest transition-all';
                fb.classList.remove('hidden'); fs.classList.add('hidden');
            }
        }

        function updateUI() {
            const listEl = document.getElementById('word-list');
            const btnStart = document.getElementById('btn-start');
            const totalBadge = document.getElementById('total-badge');
            totalBadge.innerText = cards.length;
            localStorage.setItem('my_flashcards_pro', JSON.stringify(cards));
            if (cards.length === 0) {
                listEl.innerHTML = '<div class="text-center py-16 opacity-20"><div class="text-4xl mb-2">📁</div><p class="font-black uppercase text-[10px] tracking-widest">Không có từ nào</p></div>';
                btnStart.classList.add('hidden');
            } else {
                btnStart.classList.remove('hidden');
                listEl.innerHTML = '';
                [...cards].reverse().forEach((card, index) => {
                    const actualIndex = cards.length - 1 - index;
                    const div = document.createElement('div');
                    div.className = 'bg-white p-5 rounded-3xl border border-slate-100 flex justify-between items-center shadow-sm active:bg-slate-50 transition-all';
                    div.innerHTML = `
                        <div class="overflow-hidden">
                            <p class="font-black text-indigo-600 text-lg tracking-tight truncate">${card.word}</p>
                            <p class="text-[10px] text-slate-400 font-bold uppercase tracking-wider truncate mt-0.5">${card.meaning}</p>
                        </div>
                        <button onclick="deleteCard(${actualIndex})" class="text-slate-200 active:text-red-500 p-2 transition-colors">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                            </svg>
                        </button>
                    `;
                    listEl.appendChild(div);
                });
            }
        }

        function addWord() {
            const w = document.getElementById('input-word'), m = document.getElementById('input-meaning'), e = document.getElementById('input-example');
            if (!w.value.trim() || !m.value.trim()) return;
            cards.push({ word: w.value.trim(), meaning: m.value.trim(), example: e.value.trim() });
            w.value = ''; m.value = ''; e.value = ''; updateUI();
        }

        function addBulkWords() {
            const input = document.getElementById('input-bulk');
            const lines = input.value.trim().split('\n');
            let added = 0;
            lines.forEach(line => {
                const parts = line.split(/[-:—\t]/);
                if (parts.length >= 2) {
                    const word = parts[0].trim(), meaning = parts.slice(1).join('-').trim();
                    if (word && meaning) { cards.push({ word, meaning, example: '' }); added++; }
                }
            });
            if (added > 0) { input.value = ''; switchTab('single'); updateUI(); }
        }

        function openClearModal() { if (cards.length > 0) document.getElementById('confirm-modal').style.display = 'flex'; }
        function closeModal() { document.getElementById('confirm-modal').style.display = 'none'; }
        function executeClearAll() { cards = []; updateUI(); closeModal(); }
        function deleteCard(index) { cards.splice(index, 1); updateUI(); }

        function startLearning() {
            if (cards.length === 0) return;
            currentIndex = 0;
            document.getElementById('home-container').classList.add('hidden');
            document.getElementById('game-container').classList.remove('hidden');
            showCard();
        }

        function showHome() {
            document.getElementById('home-container').classList.remove('hidden');
            document.getElementById('game-container').classList.add('hidden');
        }

        function showCard() {
            const card = cards[currentIndex];
            const flashcardEl = document.getElementById('flashcard');
            if (flashcardEl.classList.contains('flipped')) {
                flashcardEl.classList.remove('flipped');
                setTimeout(() => updateContent(card), 200);
            } else { updateContent(card); }
        }

        function updateContent(card) {
            document.getElementById('display-word').innerText = card.word;
            document.getElementById('display-meaning').innerText = card.meaning;
            document.getElementById('display-example').innerText = card.example || 'Chưa có ví dụ.';
            document.getElementById('card-counter').innerText = `Thẻ ${currentIndex + 1} / ${cards.length}`;
            const wordEl = document.getElementById('display-word');
            wordEl.classList.add('fade-in');
            setTimeout(() => wordEl.classList.remove('fade-in'), 300);
        }

        function nextCard() { currentIndex = (currentIndex + 1) % cards.length; showCard(); }
        function prevCard() { currentIndex = (currentIndex - 1 + cards.length) % cards.length; showCard(); }

        updateUI();
    </script>
</body>
</html>
