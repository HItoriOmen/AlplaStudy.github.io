<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Flashcard Học Từ Vựng Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Tối ưu cho cảm ứng iOS */
        body {
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }
        .flip-card {
            perspective: 1000px;
            height: 320px; /* Tăng độ cao một chút cho mobile */
        }
        .flip-card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            text-align: center;
            transition: transform 0.4s;
            transform-style: preserve-3d;
            cursor: pointer;
        }
        .flip-card.flipped .flip-card-inner {
            transform: rotateY(180deg);
        }
        .flip-card-front, .flip-card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 1.5rem;
            padding: 1.5rem;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }
        .flip-card-back {
            transform: rotateY(180deg);
        }
        .fade-in {
            animation: fadeIn 0.3s ease-in;
        }
        @keyframes fadeIn {
            from { opacity: 0.5; }
            to { opacity: 1; }
        }
        #confirm-modal {
            background: rgba(0, 0, 0, 0.6);
            display: none;
            align-items: center;
            justify-content: center;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 100;
        }
        /* Giúp danh sách từ cuộn mượt trên iOS */
        #word-list {
            -webkit-overflow-scrolling: touch;
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen font-sans text-slate-900 select-none">
    <!-- Custom Confirm Modal -->
    <div id="confirm-modal">
        <div class="bg-white p-6 rounded-2xl shadow-xl max-w-sm w-full mx-4">
            <h3 class="text-lg font-bold mb-2">Xác nhận xóa?</h3>
            <p class="text-slate-600 mb-6 text-sm">Hành động này sẽ xóa vĩnh viễn toàn bộ từ vựng của bạn.</p>
            <div class="flex gap-3">
                <button onclick="closeModal()" class="flex-1 px-4 py-3 bg-slate-100 active:bg-slate-200 rounded-xl font-semibold transition">Hủy</button>
                <button onclick="executeClearAll()" class="flex-1 px-4 py-3 bg-red-500 active:bg-red-600 text-white rounded-xl font-semibold transition">Xóa hết</button>
            </div>
        </div>
    </div>

    <div class="max-w-md mx-auto px-4 py-6 md:py-8">
        <header class="text-center mb-8">
            <h1 class="text-3xl font-extrabold text-indigo-600 mb-1">Flashcard Pro</h1>
            <p class="text-slate-500 text-sm font-medium">Học từ vựng mọi lúc mọi nơi</p>
        </header>

        <!-- Flashcard Display -->
        <div id="game-container" class="hidden">
            <div class="mb-6 flex justify-between items-center text-xs font-bold uppercase tracking-wider text-slate-400">
                <span id="card-counter">Thẻ 1 / 1</span>
                <button onclick="showHome()" class="text-indigo-600 flex items-center gap-1">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
                    </svg>
                    Trang chủ
                </button>
            </div>

            <div id="flashcard" class="flip-card mb-10" onclick="this.classList.toggle('flipped')">
                <div class="flip-card-inner" id="card-inner">
                    <div class="flip-card-front bg-white border-2 border-indigo-50">
                        <h2 id="display-word" class="text-4xl font-bold text-slate-800 break-words max-w-full">Word</h2>
                    </div>
                    <div class="flip-card-back bg-indigo-600 text-white">
                        <div class="text-center w-full">
                            <p id="display-meaning" class="text-2xl mb-4 font-bold px-4">Nghĩa của từ</p>
                            <p id="display-example" class="text-sm italic opacity-80 px-6 line-clamp-3">Ví dụ...</p>
                        </div>
                    </div>
                </div>
            </div>

            <div class="flex gap-4 justify-center">
                <button onclick="prevCard()" class="flex-1 py-4 rounded-2xl border-2 border-slate-200 bg-white active:bg-slate-100 transition font-bold text-slate-700">Trước</button>
                <button onclick="nextCard()" class="flex-1 py-4 rounded-2xl bg-indigo-600 text-white active:bg-indigo-700 shadow-lg shadow-indigo-200 transition font-bold">Sau</button>
            </div>
            <p class="text-center mt-8 text-slate-400 text-xs font-bold uppercase tracking-widest">Chạm vào thẻ để lật</p>
        </div>

        <!-- Dashboard / List -->
        <div id="home-container">
            <div class="flex gap-2 mb-4 bg-slate-200 p-1 rounded-xl">
                <button onclick="switchTab('single')" id="tab-single" class="flex-1 py-2.5 rounded-lg bg-white shadow-sm font-bold text-indigo-600 transition-all">Từng từ</button>
                <button onclick="switchTab('bulk')" id="tab-bulk" class="flex-1 py-2.5 rounded-lg text-slate-500 font-bold transition-all">Hàng loạt</button>
            </div>

            <div id="form-single" class="bg-white rounded-2xl p-5 shadow-sm border border-slate-100 mb-8">
                <div class="space-y-4 mb-4">
                    <input type="text" id="input-word" placeholder="Từ vựng (vd: Goal)" class="w-full px-4 py-3 bg-slate-50 border-none rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none font-medium">
                    <input type="text" id="input-meaning" placeholder="Nghĩa (vd: Mục tiêu)" class="w-full px-4 py-3 bg-slate-50 border-none rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none font-medium">
                    <textarea id="input-example" placeholder="Ví dụ của bạn..." class="w-full px-4 py-3 bg-slate-50 border-none rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none font-medium" rows="2"></textarea>
                </div>
                <button onclick="addWord()" class="w-full bg-indigo-600 text-white py-3.5 rounded-xl font-bold active:scale-[0.98] transition-transform">Thêm ngay</button>
            </div>

            <div id="form-bulk" class="hidden bg-white rounded-2xl p-5 shadow-sm border border-slate-100 mb-8">
                <p class="text-xs text-slate-400 font-bold uppercase mb-3 tracking-tight">Định dạng: Từ - Nghĩa (mỗi dòng 1 từ)</p>
                <textarea id="input-bulk" placeholder="Apple - Quả táo&#10;Book - Quyển sách" class="w-full px-4 py-3 bg-slate-50 border-none rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none mb-4 font-mono text-sm" rows="5"></textarea>
                <button onclick="addBulkWords()" class="w-full bg-indigo-600 text-white py-3.5 rounded-xl font-bold active:scale-[0.98] transition-transform">Nhập danh sách</button>
            </div>

            <div class="flex justify-between items-end mb-4 px-1">
                <div>
                    <h3 class="font-black text-xl text-slate-800">Bộ từ vựng</h3>
                    <p class="text-xs text-slate-400 font-bold uppercase"><span id="total-badge">0</span> từ đã lưu</p>
                </div>
                <div class="flex gap-3">
                    <button onclick="openClearModal()" class="text-xs text-red-400 font-bold uppercase tracking-wider py-2">Xóa hết</button>
                    <button onclick="startLearning()" id="btn-start" class="hidden bg-green-500 text-white px-6 py-2 rounded-xl font-bold shadow-md shadow-green-100 active:scale-95 transition-all">HỌC</button>
                </div>
            </div>
            
            <div id="word-list" class="space-y-3 max-h-[40vh] overflow-y-auto pb-10">
                <!-- List items -->
            </div>
        </div>
    </div>

    <script>
        let cards = JSON.parse(localStorage.getItem('my_flashcards_pro')) || [];
        let currentIndex = 0;

        function switchTab(type) {
            const ts = document.getElementById('tab-single');
            const tb = document.getElementById('tab-bulk');
            const fs = document.getElementById('form-single');
            const fb = document.getElementById('form-bulk');

            if (type === 'single') {
                ts.className = 'flex-1 py-2.5 rounded-lg bg-white shadow-sm font-bold text-indigo-600 transition-all';
                tb.className = 'flex-1 py-2.5 rounded-lg text-slate-500 font-bold transition-all';
                fs.classList.remove('hidden');
                fb.classList.add('hidden');
            } else {
                tb.className = 'flex-1 py-2.5 rounded-lg bg-white shadow-sm font-bold text-indigo-600 transition-all';
                ts.className = 'flex-1 py-2.5 rounded-lg text-slate-500 font-bold transition-all';
                fb.classList.remove('hidden');
                fs.classList.add('hidden');
            }
        }

        function updateUI() {
            const listEl = document.getElementById('word-list');
            const btnStart = document.getElementById('btn-start');
            const totalBadge = document.getElementById('total-badge');

            totalBadge.innerText = cards.length;
            localStorage.setItem('my_flashcards_pro', JSON.stringify(cards));

            if (cards.length === 0) {
                listEl.innerHTML = '<div class="text-center py-10 text-slate-300 font-bold uppercase text-xs tracking-widest">Danh sách trống</div>';
                btnStart.classList.add('hidden');
            } else {
                btnStart.classList.remove('hidden');
                listEl.innerHTML = '';
                [...cards].reverse().forEach((card, index) => {
                    const actualIndex = cards.length - 1 - index;
                    const div = document.createElement('div');
                    div.className = 'bg-white p-4 rounded-2xl border border-slate-100 flex justify-between items-center shadow-sm active:bg-slate-50 transition-all';
                    div.innerHTML = `
                        <div class="overflow-hidden">
                            <p class="font-bold text-indigo-600 truncate">${card.word}</p>
                            <p class="text-xs text-slate-400 font-bold truncate">${card.meaning}</p>
                        </div>
                        <button onclick="deleteCard(${actualIndex})" class="text-slate-300 active:text-red-500 p-2">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                            </svg>
                        </button>
                    `;
                    listEl.appendChild(div);
                });
            }
        }

        function addWord() {
            const w = document.getElementById('input-word');
            const m = document.getElementById('input-meaning');
            const e = document.getElementById('input-example');
            if (!w.value.trim() || !m.value.trim()) return;
            cards.push({ word: w.value.trim(), meaning: m.value.trim(), example: e.value.trim() });
            w.value = ''; m.value = ''; e.value = '';
            updateUI();
        }

        function addBulkWords() {
            const input = document.getElementById('input-bulk');
            const lines = input.value.trim().split('\n');
            let added = 0;
            lines.forEach(line => {
                const parts = line.split(/[-:—\t]/);
                if (parts.length >= 2) {
                    const word = parts[0].trim();
                    const meaning = parts.slice(1).join('-').trim();
                    if (word && meaning) { cards.push({ word, meaning, example: '' }); added++; }
                }
            });
            if (added > 0) { input.value = ''; switchTab('single'); updateUI(); }
        }

        function openClearModal() { if (cards.length > 0) document.getElementById('confirm-modal').style.display = 'flex'; }
        function closeModal() { document.getElementById('confirm-modal').style.display = 'none'; }
        function executeClearAll() { cards = []; updateUI(); closeModal(); }
        function deleteCard(index) { cards.splice(index, 1); updateUI(); }

        function startLearning() {
            if (cards.length === 0) return;
            currentIndex = 0;
            document.getElementById('home-container').classList.add('hidden');
            document.getElementById('game-container').classList.remove('hidden');
            showCard();
        }

        function showHome() {
            document.getElementById('home-container').classList.remove('hidden');
            document.getElementById('game-container').classList.add('hidden');
        }

        function showCard() {
            const card = cards[currentIndex];
            const flashcardEl = document.getElementById('flashcard');
            if (flashcardEl.classList.contains('flipped')) {
                flashcardEl.classList.remove('flipped');
                setTimeout(() => updateContent(card), 200);
            } else { updateContent(card); }
        }

        function updateContent(card) {
            document.getElementById('display-word').innerText = card.word;
            document.getElementById('display-meaning').innerText = card.meaning;
            document.getElementById('display-example').innerText = card.example || 'Không có ví dụ.';
            document.getElementById('card-counter').innerText = `Thẻ ${currentIndex + 1} / ${cards.length}`;
            const wordEl = document.getElementById('display-word');
            wordEl.classList.add('fade-in');
            setTimeout(() => wordEl.classList.remove('fade-in'), 300);
        }

        function nextCard() { currentIndex = (currentIndex + 1) % cards.length; showCard(); }
        function prevCard() { currentIndex = (currentIndex - 1 + cards.length) % cards.length; showCard(); }

        updateUI();
    </script>
</body>
</html>
